---
name: ShellCheck

"on":
  push:
    branches: [ main ]
    paths:
      - "**/*.sh"
      - "**/*.bash"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "**/*.sh"
      - "**/*.bash"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          # deploy/ と mise/tasks/ 配下の shell script を再帰的にチェックする
          # -P SCRIPTDIR: source 時の path 解決基準を script 自身の dir に固定
          find ./deploy ./mise/tasks -type f \( -name "*.sh" -o -name "*.bash" \) \
            -exec shellcheck -x -P SCRIPTDIR {} +
