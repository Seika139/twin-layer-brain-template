<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 360px;
        padding: 12px;
        font-family: -apple-system, sans-serif;
        font-size: 13px;
      }

      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }

      label {
        display: block;
        margin-top: 8px;
        font-weight: 600;
        font-size: 12px;
      }

      input,
      textarea {
        width: 100%;
        margin-top: 4px;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        box-sizing: border-box;
      }

      textarea {
        height: 100px;
        resize: vertical;
        font-size: 12px;
      }

      .url-display {
        font-size: 11px;
        color: #6b7280;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      button.primary {
        margin-top: 12px;
        width: 100%;
        padding: 10px;
        background: #0d9488;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary:hover {
        background: #0f766e;
      }

      button.primary:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .status {
        margin-top: 8px;
        padding: 6px;
        border-radius: 4px;
        font-size: 12px;
        display: none;
      }

      .status.success {
        display: block;
        background: #dcfce7;
        color: #166534;
      }

      .status.error {
        display: block;
        background: #fef2f2;
        color: #991b1b;
      }

      .settings-link {
        display: block;
        margin-top: 8px;
        font-size: 11px;
        color: #6b7280;
        text-align: right;
        cursor: pointer;
      }

      .settings {
        display: none;
        margin-top: 8px;
        padding: 8px;
        background: #f9fafb;
        border-radius: 4px;
      }

      .settings.open {
        display: block;
      }

      .settings button {
        margin-top: 8px;
        width: 100%;
        padding: 6px;
        background: #6b7280;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
      }

      .settings button.secondary {
        background: #0f766e;
      }

      .hint {
        margin-top: 2px;
        font-size: 11px;
        color: #9ca3af;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
      }

      .toggle-label {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .toggle {
        display: block;
        position: relative;
        width: 36px;
        height: 20px;
        cursor: pointer;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .toggle .slider {
        position: absolute;
        inset: 0;
        background: #cbd5e1;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle .slider::before {
        content: "";
        position: absolute;
        left: 2px;
        top: 2px;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      .toggle input:checked + .slider {
        background: #0d9488;
      }

      .toggle input:checked + .slider::before {
        transform: translateX(16px);
      }
    </style>
  </head>

  <body>
    <h1>Twin Layer Brain Clipper</h1>

    <label for="title">Title</label> <input type="text" id="title" />

    <label for="url">URL</label>
    <input type="text" id="url" class="url-display" readonly />
    <input type="hidden" id="canonical-url" />

    <label for="tags">Tags</label>
    <input
      type="text"
      id="tags"
      placeholder="comma separated (auto-generated if empty)"
    />

    <div class="hint">利用可能な LLM API があれば要約・タグを生成します</div>

    <label for="content">Content</label>
    <textarea
      id="content"
      placeholder="Page content (auto-extracted)"
    ></textarea>

    <div class="toggle-row">
      <label for="use-llm" class="toggle-label">AI 要約・タグ生成を試す</label>
      <label class="toggle" title="AI 要約・タグ生成を試す">
        <input type="checkbox" id="use-llm" checked />
        <span class="slider"></span>
      </label>
    </div>

    <button id="clip" class="primary">Clip</button>

    <div id="status" class="status"></div>

    <span class="settings-link" id="toggle-settings">Settings</span>
    <div class="settings" id="settings-panel">
      <label for="endpoint">API Endpoint</label>
      <input type="text" id="endpoint" placeholder="http://localhost:15200" />
      <label for="token">Bearer Token</label>
      <input type="password" id="token" placeholder="BRAIN_API_TOKEN" />
      <div class="hint">repo root の .env にある BRAIN_API_TOKEN と同じ値</div>
      <button id="save-settings">Save Settings</button>
      <button id="check-token" class="secondary">接続と token を確認</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
