interface:
  display_name: "Wiki Dive"
  short_description: "wiki では不十分と分かっている時や最新 repo にしかない情報を取りに行く時に、raw/ を直接深く読む skill"
  default_prompt: "Use this skill when the user has explicitly said the wiki summary is insufficient, when they invoke /dive, or when they need information that lives only in a recently updated raw/repos/<repo>/ that has not been re-ingested yet. Start by confirming the focus in one sentence, do a 60-second wiki scan to avoid rediscovering known facts, then read raw/ hierarchically (anchor → neighbours → cross-cutting context) and stop when the focus question can be answered. Cite every claim with file:line references using [descriptor](../../raw/...) markdown links. Default save destination is wiki/analyses/YYYY-MM-DD-dive-<slug>.md with `type: analysis` frontmatter and dive_focus / dive_target fields; update a wiki source page only after the user confirms a permanent fact is in play; skip the file write if the user asks not to save. Always append a dive entry to wiki/log.md."
