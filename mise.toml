# mise configuration for twin-layer-brain-template.
# Run `mise tasks` to list tasks, `mise run <name>` to execute.

[settings]
install_before = "7d"

[tools]
python = "3.14"
node = "25"
uv = "latest"
pnpm = "latest"
shfmt = "latest"
rumdl = "latest"
taplo = "latest"

[tasks.init]
description = "brain instance の初期化（ディレクトリ作成、依存同期、index .env 作成）"
quiet = true
run = [
  "test -d mise/tasks && chmod +x mise/tasks/*.sh",
  "bash mise/tasks/initialize.sh",
]

# --- Layer 1 (SQLite) CLI --------------------------------------------------
# 人間が直接叩く kc 系 task は以下に絞っている。
# `search` / `show` / `suggest-related` / `new` などは LLM agent や server が
# 内部で `uv run kc <subcommand>` として呼ぶ想定。
# ユーザーがそれらを手動で叩きたい場合は `mise run kc` (fzf 選択、TTY 時) か
# `mise run kc -- <subcommand> [args...]` を使う。

[tasks.index]
description = "検索 index (SQLite FTS5 + vec) を再構築する"
quiet = true
run = 'uv run kc index "$@"'

[tasks.validate]
description = "索引対象の Markdown frontmatter を機械的にチェックする（YAML parse error 検出）"
quiet = true
run = "uv run kc validate"

[tasks.status]
description = "index DB のサイズ / note 件数 / embedding カバレッジを表示する"
quiet = true
run = "uv run kc status"

[tasks.check-keys]
description = "LLM API key と embedding 設定状態を確認する（引数: --json, --color）"
quiet = true
run = 'uv run kc check-keys "$@"'

[tasks."check-keys-live"]
description = "LLM API key と embedding 実生成 probe を確認する（API 使用あり、引数: --json, --color）"
quiet = true
run = 'uv run kc check-keys --live-embedding "$@"'

# `kc` passthrough は mise/tasks/kc.sh に実装。
# 引数なし + TTY なら fzf で subcommand 選択、非 TTY ならエラー案内。

# --- Layer 1 server (FastAPI + MCP) ----------------------------------------

[tasks.serve]
description = "HTTP server を foreground で起動する（開発用）"
run = "uv run python -m server.run"

# --- Python ----------------------------------------------------------------

[tasks.test]
description = "Python test suite を実行する"
run = "uv run pytest"

# --- Chrome extension ------------------------------------------------------

[tasks.recolor-icon]
description = "chrome-extension/icon{48,128}.png の accent color を差し替える（引数なしでランダム生成 / 例: mise run recolor-icon -- '#7b1fa2'）"
quiet = true
# mise は task run 文字列の末尾にユーザー引数を連結するだけで $1/$@ を設定しない。
# そのため sh -c "script" -- で自前 sub-shell を開き、連結された引数を $1 として受ける。
# 引数未指定 (= $1 が空) のときは recolor-icon.py 側で HSV 範囲内の色をランダム生成する。
run = '''sh -c "uv run --with pillow python mise/tasks/lib/recolor-icon.py \${1:+--target \"\$1\"} chrome-extension/icon48.png chrome-extension/icon128.png" --'''
