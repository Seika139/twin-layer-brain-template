# mise configuration for brain-accelerator.
# Run `mise tasks` to list tasks, `mise run <name>` to execute.

[tools]
# No tool pins — the repo's tasks shell out to git/rumdl/markdownlint-cli2
# which are installed at the user level.

[tasks.scaffold-brain]
description = "Empty inherited template content so a freshly cloned brain starts blank (refuses to run inside brain-accelerator itself)"
usage = "cd ~/programs/brain-<topic> && mise run scaffold-brain"
file = "mise/tasks/scaffold-brain.sh"

[tasks.clone-repo]
description = "Clone a GitHub repo into raw/repos/ for ingest"
usage = "mise run clone-repo <owner>/<repo> [branch]"
file = "mise/tasks/clone-repo.sh"

[tasks.update-repos]
description = "git pull every repo under raw/repos/"
file = "mise/tasks/update-repos.sh"

[tasks.lint]
description = "Run both linters (rumdl + markdownlint-cli2) on all tracked markdown"
run = """
set -e
echo '=== rumdl ==='
rumdl check .
echo '=== markdownlint-cli2 ==='
markdownlint-cli2
"""

[tasks.lint-fix]
description = "Auto-fix what the linters can fix (rumdl --fix, markdownlint-cli2 --fix)"
run = """
set -e
echo '=== rumdl --fix ==='
rumdl check --fix .
echo '=== markdownlint-cli2 --fix ==='
markdownlint-cli2 --fix '**/*.md'
"""
